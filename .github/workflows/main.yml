name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 코드가 푸시되면 자동 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 깃허브 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 도커 허브 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. 도커 이미지 빌드 및 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-web-app:latest
          no-cache: true

      # 4. GCP 서버에 접속해서 배포 (SSH)
      - name: Deploy to GCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: pc  # GCP 터미널 사용자 이름
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/my-stack
            docker compose pull
            docker compose up -d
            docker image prune -f
